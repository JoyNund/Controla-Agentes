# agentes.controla.digital → VPS 95.111.241.3
# Proyecto en el servidor: /var/www/agentes (o la carpeta donde subas el repo)
#
# Copiar a: sudo nano /etc/nginx/sites-available/agentes.controla.digital
# Activar:  sudo ln -sf /etc/nginx/sites-available/agentes.controla.digital /etc/nginx/sites-enabled/
# Probar:   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name agentes.controla.digital;

    location / {
        proxy_pass http://127.0.0.1:3847;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
